<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0ea5e9">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="นม & ออม">
<link rel="apple-touch-icon" href="https://i.postimg.cc/PJHzcTcj/de7ae058-ba51-42bd-a6ee-77b5a6faa565-removebg-preview.png">
<link rel="icon" href="https://i.postimg.cc/PJHzcTcj/de7ae058-ba51-42bd-a6ee-77b5a6faa565-removebg-preview.png">
<link rel="manifest" href="manifest.json">
<title>ระบบจัดการดื่มนมและออมเงินของนักเรียน</title>
<style>
  html,body{margin:0;height:100%;background:#0ea5e9;overflow:hidden}
  iframe{border:0;width:100%;height:100%;display:block}
  #msg{font-family:'Segoe UI',sans-serif;color:#fff;padding:28px;line-height:1.7;font-size:16px}
  #msg code{background:rgba(255,255,255,.2);padding:2px 6px;border-radius:6px}
  #install{position:fixed;right:14px;bottom:16px;z-index:9;background:#fff;color:#0369a1;border:none;border-radius:14px;padding:11px 16px;font-weight:700;font-size:15px;box-shadow:0 8px 20px rgba(0,0,0,.28);cursor:pointer;font-family:'Segoe UI',sans-serif;display:none}
  #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:linear-gradient(150deg,#7dd3fc,#0ea5e9);z-index:5;transition:opacity .4s}
  #splash img{width:96px;height:96px;border-radius:24px;background:#fff;padding:8px;object-fit:contain}
  #splash div{color:#fff;font-family:'Segoe UI',sans-serif;font-weight:700}
  #splash.hide{opacity:0;pointer-events:none}
</style>
</head>
<body>
<!-- ★★★ วางลิงก์เว็บแอป (ลงท้ายด้วย /exec) ตรงนี้ ★★★ -->
<script>var EXEC_URL = "https://script.google.com/macros/s/AKfycbzB7-BqRmP-U3sHdH3by34X9IZw_lRpbMeLRM9MC0UmvwMRp5aApO5EceHTAa6pzn5dQA/exec";
// เปลี่ยนโลโก้บน GitHub: แก้ URL ล่างนี้ให้ตรงกับที่ตั้งในระบบ แล้วอัปโหลด index.html ใหม่
var LOGO_URL = "https://i.postimg.cc/PJHzcTcj/de7ae058-ba51-42bd-a6ee-77b5a6faa565-removebg-preview.png";</script>

<div id="splash"><img id="splash-logo" alt="โลโก้"><div>กำลังเปิดระบบ...</div></div>
<button id="install">📲 ติดตั้งแอป</button>

<script>
(function(){
  try{
    var sl=document.getElementById('splash-logo'); if(sl) sl.src=LOGO_URL;
    var ai=document.querySelector('link[rel="apple-touch-icon"]'); if(ai) ai.href=LOGO_URL;
    var fv=document.querySelector('link[rel="icon"]'); if(fv) fv.href=LOGO_URL;
  }catch(e){}
  if(EXEC_URL.indexOf('/exec') < 0){
    document.body.innerHTML = '<div id="msg">⚠️ ยังไม่ได้ตั้งค่าลิงก์<br><br>เปิดไฟล์ <code>index.html</code> แล้วแก้ตัวแปร <code>EXEC_URL</code> ให้เป็นลิงก์เว็บแอปของคุณ (ลงท้ายด้วย <code>/exec</code>) แล้วอัปโหลดใหม่</div>';
    return;
  }
  var ifr = document.createElement('iframe');
  ifr.src = EXEC_URL;
  ifr.setAttribute('allow', 'clipboard-write; fullscreen');
  ifr.onload = function(){ var s=document.getElementById('splash'); if(s){ s.classList.add('hide'); setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); }, 500); } };
  document.body.insertBefore(ifr, document.body.firstChild);

  if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(function(){}); }

  var deferred = null, btn = document.getElementById('install');
  window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferred = e; btn.style.display = 'block'; });
  btn.addEventListener('click', function(){ if(deferred){ deferred.prompt(); deferred = null; btn.style.display = 'none'; } });
  window.addEventListener('appinstalled', function(){ btn.style.display = 'none'; });
})();
</script>
</body>
</html>
